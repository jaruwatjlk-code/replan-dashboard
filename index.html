<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replan Performance & Loss Overview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1e2334;
  --border: #2a3045;
  --accent: #f5a623;
  --accent2: #e74c3c;
  --blue: #3b8ef3;
  --green: #2ecc71;
  --purple: #9b59b6;
  --text: #e8ecf4;
  --text2: #8a93a8;
  --new-badge: #ffe066;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; align-items: center; gap: 12px;
  height: 60px; position: sticky; top: 0; z-index: 200; flex-wrap: wrap;
}
.logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #000; flex-shrink: 0; }
.title-block h1 { font-size: 16px; font-weight: 700; }
.title-block h1 span { color: var(--accent2); }
.title-block p { font-size: 10px; color: var(--text2); }
.filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-left: 8px; }
.fg { display: flex; flex-direction: column; gap: 1px; }
.fg label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; }
select.fs, input.fs {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 4px 8px; border-radius: 6px; font-size: 11px; font-family: inherit; cursor: pointer; min-width: 80px;
}
select.fs:focus, input.fs:focus { outline: none; border-color: var(--accent); }
.btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn.primary:hover { background: #ffb84d; color: #000; }
.update-info { margin-left: auto; text-align: right; font-size: 10px; color: var(--text2); }
.update-info strong { display: block; font-size: 12px; color: var(--text); }

/* UPLOAD MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-bg.hidden { display: none; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 420px; max-width: 90vw; }
.modal h2 { font-size: 18px; margin-bottom: 6px; }
.modal p { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
.drop-zone {
  border: 2px dashed var(--border); border-radius: 12px; padding: 36px 20px;
  text-align: center; cursor: pointer; transition: all .25s;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(245,166,35,.05); }
.drop-icon { font-size: 40px; margin-bottom: 12px; }
.drop-zone p { margin-bottom: 14px; font-size: 13px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
#uploadStatus { font-size: 12px; color: var(--accent2); margin-top: 8px; min-height: 18px; }

/* CHIPS */
.chips { display: flex; gap: 6px; flex-wrap: wrap; padding: 6px 20px 0; min-height: 28px; }
.chip { display: flex; align-items: center; gap: 3px; background: rgba(245,166,35,.15); color: var(--accent); border: 1px solid rgba(245,166,35,.3); border-radius: 20px; padding: 2px 10px; font-size: 11px; cursor: pointer; }
.chip:hover { background: rgba(245,166,35,.25); }

/* CONTENT */
.content { padding: 12px 20px 24px; display: flex; flex-direction: column; gap: 12px; }

/* KPI STRIP */
.kpi-strip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
}
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 10px 10px 0 0; }
.kpi-card.c-blue::before { background: var(--blue); }
.kpi-card.c-green::before { background: var(--green); }
.kpi-card.c-orange::before { background: var(--accent); }
.kpi-card.c-red::before { background: var(--accent2); }
.kpi-card.c-purple::before { background: var(--purple); }
.kpi-card.c-yellow::before { background: var(--new-badge); }
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.4); }
.kpi-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.kpi-val { font-size: 22px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; line-height: 1; }
.kpi-val.blue { color: var(--blue); } .kpi-val.green { color: var(--green); }
.kpi-val.orange { color: var(--accent); } .kpi-val.red { color: var(--accent2); }
.kpi-val.purple { color: var(--purple); } .kpi-val.yellow { color: var(--new-badge); }
.kpi-sub { font-size: 10px; color: var(--text2); margin-top: 4px; }
.badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-top: 3px; }
.badge-g { background: rgba(46,204,113,.15); color: var(--green); }
.badge-r { background: rgba(231,76,60,.15); color: var(--accent2); }
.badge-o { background: rgba(245,166,35,.15); color: var(--accent); }

/* GRID */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* CARD */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.card-hdr { padding: 10px 14px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 12px; font-weight: 600; }
.card-badge { font-size: 10px; color: var(--text2); background: var(--surface2); padding: 1px 7px; border-radius: 8px; }
.card-body { padding: 12px; }

/* TABLE */
.tbl-wrap { overflow: auto; max-height: 280px; }
.tbl-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
.tbl-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { background: var(--surface2); color: var(--text2); padding: 6px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; position: sticky; top: 0; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); white-space: nowrap; }
th:hover { color: var(--accent); }
th.sa::after { content: ' ↑'; color: var(--accent); }
th.sd::after { content: ' ↓'; color: var(--accent); }
td { padding: 5px 8px; border-bottom: 1px solid rgba(42,48,69,.4); white-space: nowrap; }
tr:hover td { background: rgba(59,142,243,.05); cursor: pointer; }
tr.new-row td { background: rgba(255,224,102,.06); }
tr.sel td { background: rgba(245,166,35,.1); }
.tr { text-align: right; font-family: 'IBM Plex Mono', monospace; }
tfoot td { font-weight: 700; background: var(--surface2); border-top: 1px solid var(--border); }
.new-tag { display: inline-block; background: var(--new-badge); color: #000; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

/* SEARCH */
.tbl-search { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 3px 8px; border-radius: 5px; font-size: 11px; width: 150px; }

/* NO DATA */
.no-data { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }

@media(max-width:1200px){ .kpi-strip{grid-template-columns:repeat(3,1fr);} .grid-2,.grid-3{grid-template-columns:1fr;} }
@media(max-width:700px){ .kpi-strip{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">ST</div>
  <div class="title-block">
    <h1>Replan Performance & <span>Loss</span> Overview</h1>
    <p>Summary of replan value and cost impact by process</p>
  </div>
  <div class="filter-bar">
    <div class="fg"><label>Year</label><select class="fs" id="fYear" onchange="applyFilters()"></select></div>
    <div class="fg"><label>Month</label><select class="fs" id="fMonth" onchange="applyFilters()"></select></div>
    <div class="fg"><label>Department</label><select class="fs" id="fDept" onchange="applyFilters()"></select></div>
    <div class="fg"><label>Machine</label><select class="fs" id="fMach" onchange="applyFilters()"></select></div>
    <button class="btn" onclick="resetFilters()">↺ Reset</button>
    <button class="btn primary" onclick="openUpload()">📁 อัปเดตข้อมูล</button>
  </div>
  <div class="update-info"><strong id="updateDate">—</strong>Data Update</div>
</div>

<!-- UPLOAD MODAL -->
<div class="modal-bg hidden" id="uploadModal">
  <div class="modal">
    <h2>📁 อัปเดตข้อมูล</h2>
    <p>อัปโหลดไฟล์ Excel ที่มี sheet <strong style="color:var(--accent)">rpall_</strong> และ <strong style="color:var(--accent)">Target</strong></p>
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📊</div>
      <p>ลากไฟล์ .xlsx มาวางที่นี่<br>หรือคลิกเพื่อเลือกไฟล์</p>
      <button class="btn primary" onclick="document.getElementById('fileInput').click()">เลือกไฟล์</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    </div>
    <div id="uploadStatus"></div>
    <div class="modal-btns">
      <button class="btn" onclick="loadDemo()">ทดสอบด้วย Demo</button>
      <button class="btn" onclick="closeUpload()">ปิด</button>
    </div>
  </div>
</div>

<!-- ACTIVE FILTER CHIPS -->
<div class="chips" id="chips"></div>

<!-- MAIN CONTENT -->
<div class="content" id="mainContent">
  <div class="no-data">📂 กรุณาอัปโหลดไฟล์ Excel เพื่อดูข้อมูล<br><br>
    <button class="btn primary" onclick="openUpload()" style="padding:8px 20px;font-size:13px">📁 อัปเดตข้อมูล</button>
    <span style="margin:0 10px;color:var(--text2)">หรือ</span>
    <button class="btn" onclick="loadDemo()" style="padding:8px 20px;font-size:13px">ดูตัวอย่าง Demo</button>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let allData = [], filteredData = [], targetData = {};
let sortMain = {col:'val',dir:'desc'}, sortNew = {col:'val',dir:'desc'};
let chartsMap = {};

const MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmt = n => isNaN(n) ? '-' : Math.round(n).toLocaleString('en-US');
const fmtB = n => {
  if (isNaN(n)) return '-';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toLocaleString('en-US');
};

// ============================================================
// UPLOAD / MODAL
// ============================================================
function openUpload() { document.getElementById('uploadModal').classList.remove('hidden'); }
function closeUpload() { document.getElementById('uploadModal').classList.add('hidden'); document.getElementById('uploadStatus').textContent=''; }

document.getElementById('fileInput').addEventListener('change', e => { if(e.target.files[0]) readExcel(e.target.files[0]); });
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files[0]) readExcel(e.dataTransfer.files[0]); });

function setStatus(msg, err=false) {
  const el = document.getElementById('uploadStatus');
  el.textContent = msg; el.style.color = err ? 'var(--accent2)' : 'var(--green)';
}

function readExcel(file) {
  setStatus('กำลังอ่านไฟล์...');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array' });
      // Read rpall_ sheet
      let rpSheet = wb.SheetNames.find(n => n.toLowerCase().startsWith('rpall_'));
      if (!rpSheet) rpSheet = wb.SheetNames[0];
      const rpRaw = XLSX.utils.sheet_to_json(wb.Sheets[rpSheet], { defval:'' });

      // Read Target sheet
      let tgSheet = wb.SheetNames.find(n => n.toLowerCase() === 'target');
      if (tgSheet) {
        const tgRaw = XLSX.utils.sheet_to_json(wb.Sheets[tgSheet], { defval:0 });
        parseTarget(tgRaw);
      }

      parseData(rpRaw);
      setStatus(`✅ โหลดสำเร็จ ${allData.length.toLocaleString()} rows จาก "${rpSheet}"`);
      setTimeout(closeUpload, 1200);
    } catch(err) { setStatus('อ่านไฟล์ไม่ได้: '+err.message, true); }
  };
  reader.readAsArrayBuffer(file);
}

function parseTarget(raw) {
  targetData = {};
  raw.forEach(row => {
    const norm = k => String(k).toLowerCase().trim();
    const keys = Object.keys(row).map(norm);
    const dept = row[Object.keys(row)[keys.indexOf('dept')]] || row[Object.keys(row)[0]];
    const target = parseFloat(row[Object.keys(row)[keys.indexOf('target')]] || row[Object.keys(row)[1]] || 0);
    if (dept) targetData[String(dept).trim()] = target;
  });
}

function parseData(raw) {
  const n = k => String(k).toLowerCase().replace(/\s+/g,'_').trim();
  allData = raw.map(row => {
    const r = {};
    Object.keys(row).forEach(k => r[n(k)] = row[k]);
    const jo = r.jo || '';
    const compnt = r.compnt || r.component || r.comp || '';
    const jo_problem = r.jo_problem || r.jo_prob || '';
    const machine = r.machine || r.mach || '';
    const cause = r.cause || r.reason || '';
    const dept = r.dept || r.department || '';
    const check = r.check !== undefined ? parseInt(r.check) : 1;
    let year = parseInt(r.year || r.yr || 0);
    let month = parseInt(r.month || r.mon || r.mth || 0);
    if (!year || !month) {
      const dv = r.date || r.plan_date || r.replan_date || '';
      if (dv) {
        let d;
        if (typeof dv === 'number') { const dd = XLSX.SSF.parse_date_code(dv); year=dd.y; month=dd.m; }
        else { d = new Date(dv); if(!isNaN(d)){year=d.getFullYear();month=d.getMonth()+1;} }
      }
    }
    const val = parseFloat(r.val || r.value || r.amount || r.cost || 0);
    return { jo, compnt, jo_problem, machine, cause, dept, year, month, val, check, isNew: check === 0 };
  }).filter(r => r.val !== 0 || r.jo);
  document.getElementById('updateDate').textContent = new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'}) + ' ';
  buildFilters();
  applyFilters();
}

// ============================================================
// DEMO
// ============================================================
function loadDemo() {
  const depts = ['PR1','OUTWORK','PR2','CON2','CON1','cutout','MAT','PDTN','GL1'];
  const machines = ['PRT16','PRT202','OUTPR','OUTWORK','CON2M','CUTM'];
  const causes = ['SETOFF','ตัวหนังสือหาย','สีเพี้ยน','OUTWORKรอย','ตัวหนังสือบวม','งานเสีย','พิมพ์เบี้ยว'];
  const comps = ['TEP(031R01)','TGT(644)','PNV(029R01)','MB(1330)','TCSB(061R01)','SCJ(030.D2)','MGTH(Z329)','LION(1692.F)','LION(1566)','TTW(Z635.F)'];
  const data = [];
  targetData = { PR1:179990, CON1:45794, GL1:3445, PR2:120236, CON2:11164, PDTN:43776, 'Avg.':539207, All:404405 };
  [2025,2026].forEach(yr => {
    for (let m=1;m<=12;m++) {
      for (let i=0;i<Math.floor(Math.random()*18)+4;i++) {
        const dept = depts[Math.floor(Math.random()*depts.length)];
        data.push({
          jo: 70000+Math.floor(Math.random()*15000),
          compnt: comps[Math.floor(Math.random()*comps.length)],
          jo_problem: 70000+Math.floor(Math.random()*10000),
          machine: machines[Math.floor(Math.random()*machines.length)],
          cause: causes[Math.floor(Math.random()*causes.length)],
          dept, year: yr, month: m,
          val: Math.floor(Math.random()*35000)+500,
          check: Math.random() < 0.2 ? 0 : 1
        });
      }
    }
  });
  allData = data.map(r => ({...r, isNew: r.check===0}));
  document.getElementById('updateDate').textContent = 'Demo ';
  closeUpload();
  buildFilters();
  applyFilters();
}

// ============================================================
// FILTERS
// ============================================================
function buildFilters() {
  const years = [...new Set(allData.map(r=>r.year).filter(Boolean))].sort();
  const months = [...new Set(allData.map(r=>r.month).filter(Boolean))].sort((a,b)=>a-b);
  const depts = [...new Set(allData.map(r=>r.dept).filter(Boolean))].sort();
  const machs = [...new Set(allData.map(r=>r.machine).filter(Boolean))].sort();

  const setOpts = (id, vals, label, mapFn) => {
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = `<option value="all">All ${label}</option>` + vals.map(v=>`<option value="${v}">${mapFn?mapFn(v):v}</option>`).join('');
    if (vals.includes(cur) || cur === 'all') el.value = cur;
  };
  setOpts('fYear', years, 'Years');
  setOpts('fMonth', months, 'Months', m => MONTHS[m]);
  setOpts('fDept', depts, 'Depts');
  setOpts('fMach', machs, 'Machines');

  // Set default year to latest
  if (years.length && document.getElementById('fYear').value === 'all') {
    // keep all
  }
}

function applyFilters() {
  const y = document.getElementById('fYear').value;
  const m = document.getElementById('fMonth').value;
  const d = document.getElementById('fDept').value;
  const mc = document.getElementById('fMach').value;

  filteredData = allData.filter(r => {
    if (y!=='all' && String(r.year)!==y) return false;
    if (m!=='all' && String(r.month)!==m) return false;
    if (d!=='all' && r.dept!==d) return false;
    if (mc!=='all' && r.machine!==mc) return false;
    return true;
  });
  renderChips();
  renderAll();
}

function resetFilters() {
  ['fYear','fMonth','fDept','fMach'].forEach(id => document.getElementById(id).value='all');
  applyFilters();
}

function renderChips() {
  const map = {fYear:'Year',fMonth:'Month',fDept:'Dept',fMach:'Machine'};
  const chips = document.getElementById('chips');
  chips.innerHTML = '';
  Object.entries(map).forEach(([id,label]) => {
    const v = document.getElementById(id).value;
    if (v!=='all') {
      const c = document.createElement('div'); c.className='chip';
      c.innerHTML = `${label}: <strong>${id==='fMonth'?MONTHS[v]:v}</strong><span style="margin-left:4px;font-size:14px" onclick="clearFilter('${id}')">×</span>`;
      chips.appendChild(c);
    }
  });
}
function clearFilter(id) { document.getElementById(id).value='all'; applyFilters(); }

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';

  // KPI
  const kpiDiv = document.createElement('div'); kpiDiv.className='kpi-strip'; mc.appendChild(kpiDiv);
  renderKPIs(kpiDiv);

  // Charts row
  const g2 = document.createElement('div'); g2.className='grid-2'; mc.appendChild(g2);
  const monthCard = makeCard('📅 Monthly Value (THB)', 'คลิกแท่งเพื่อกรอง'); g2.appendChild(monthCard);
  const deptCard = makeCard('🏭 Department Value', 'คลิกเพื่อกรอง'); g2.appendChild(deptCard);

  // Charts row 2
  const g3 = document.createElement('div'); g3.className='grid-2'; mc.appendChild(g3);
  const prodCard = makeCard('📦 Top 10 Products by Value', ''); g3.appendChild(prodCard);
  const kpiGaugeCard = makeCard('🎯 KPI vs Target', ''); g3.appendChild(kpiGaugeCard);

  // Tables
  const tblCard = makeCard('📋 รายละเอียดทั้งหมด', ''); mc.appendChild(tblCard);
  const newCard = makeCard('🆕 รายการใหม่ (check = 0)', `${filteredData.filter(r=>r.isNew).length} รายการ`); mc.appendChild(newCard);

  // Render charts
  renderMonthly(monthCard.querySelector('.card-body'));
  renderDept(deptCard.querySelector('.card-body'));
  renderProduct(prodCard.querySelector('.card-body'));
  renderGauge(kpiGaugeCard.querySelector('.card-body'));
  renderTable(tblCard, filteredData, 'main');
  renderTable(newCard, filteredData.filter(r=>r.isNew), 'new', true);
}

function makeCard(title, badge) {
  const c = document.createElement('div'); c.className='card';
  c.innerHTML = `<div class="card-hdr"><span class="card-title">${title}</span><span class="card-badge">${badge}</span></div><div class="card-body"></div>`;
  return c;
}

// ============================================================
// KPIs
// ============================================================
function renderKPIs(container) {
  const totalVal = filteredData.reduce((a,r)=>a+r.val,0);
  const jobs5k = filteredData.filter(r=>r.val>5000);
  const totalJobs = filteredData.length;
  const newItems = filteredData.filter(r=>r.isNew);

  // Target
  const tgtAll = targetData['All'] || targetData['all'] || 0;
  const tgtAvg = targetData['Avg.'] || targetData['avg'] || targetData['AVG'] || 0;
  const pct = tgtAll > 0 ? ((totalVal - tgtAll)/tgtAll*100) : null;
  const pass = pct !== null ? totalVal <= tgtAll : null;

  const cards = [
    { label:'Total Value (THB)', val: fmtB(totalVal), cls:'blue', sub: tgtAll ? `Target: ${fmtB(tgtAll)} THB` : 'รวมทั้งหมด',
      badge: pct!==null ? `<span class="badge ${pass?'badge-g':'badge-r'}">${pass?'✓':'⚠'} ${Math.abs(pct).toFixed(1)}% ${pass?'ต่ำกว่า':'เกิน'}เป้า</span>` : '' },
    { label:'Target All (THB)', val: tgtAll ? fmtB(tgtAll) : '—', cls:'orange', sub:'เป้าหมายรวม' },
    { label:'Baseline Avg (THB)', val: tgtAvg ? fmtB(tgtAvg) : '—', cls:'purple', sub:'ค่าเฉลี่ย Baseline' },
    { label:'Total Jobs', val: fmt(totalJobs), cls:'green', sub:'จำนวนรายการทั้งหมด' },
    { label:'Jobs > 5,000 THB', val: fmt(jobs5k.length), cls:'red',
      sub:`มูลค่ารวม: ${fmtB(jobs5k.reduce((a,r)=>a+r.val,0))} THB` },
    { label:'รายการใหม่ (check=0)', val: fmt(newItems.length), cls:'yellow',
      sub:`มูลค่ารวม: ${fmtB(newItems.reduce((a,r)=>a+r.val,0))} THB` },
  ];

  container.innerHTML = cards.map(c=>`
    <div class="kpi-card c-${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-val ${c.cls}">${c.val}</div>
      <div class="kpi-sub">${c.sub}</div>
      ${c.badge||''}
    </div>`).join('');
}

// ============================================================
// MONTHLY CHART
// ============================================================
function renderMonthly(container) {
  container.innerHTML = '';
  const years = [...new Set(filteredData.map(r=>r.year).filter(Boolean))].sort();
  const selY = document.getElementById('fYear').value;
  const src = selY!=='all' ? filteredData : filteredData.filter(r=>r.year===Math.max(...years));
  const labels = MONTHS.slice(1);
  const vals = Array.from({length:12},(_,i)=>src.filter(r=>r.month===i+1).reduce((a,r)=>a+r.val,0));
  const tgtAll = targetData['All'] || targetData['all'] || 0;
  const tgtAvg = targetData['Avg.'] || targetData['avg'] || targetData['AVG'] || 0;

  const wrap = document.createElement('div'); wrap.style.cssText='position:relative;height:220px'; container.appendChild(wrap);
  const canvas = document.createElement('canvas'); wrap.appendChild(canvas);

  const datasets = [{
    label:'Value (THB)', data: vals, type:'bar',
    backgroundColor: vals.map(v => v > (tgtAll||tgtAvg) ? 'rgba(231,76,60,0.8)' : 'rgba(59,142,243,0.8)'),
    borderRadius: 4, order: 2,
    datalabels: { display: true, color:'#e8ecf4', font:{size:9}, formatter: v => v>0?fmtB(v):'' }
  }];
  if (tgtAvg) datasets.push({ label:`Avg. ${fmtB(tgtAvg)}`, data:Array(12).fill(tgtAvg), type:'line', borderColor:'#f5a623', borderWidth:2, borderDash:[6,3], pointRadius:0, fill:false, order:1, datalabels:{display:false} });
  if (tgtAll) datasets.push({ label:`Target ${fmtB(tgtAll)}`, data:Array(12).fill(tgtAll), type:'line', borderColor:'#e74c3c', borderWidth:2, borderDash:[4,2], pointRadius:0, fill:false, order:0, datalabels:{display:false} });

  const chart = new Chart(canvas, {
    type:'bar', data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      onClick:(e,els)=>{ if(els.length){ const m=els[0].index+1; document.getElementById('fMonth').value=String(m); applyFilters(); } },
      plugins:{
        legend:{ labels:{ color:'#8a93a8', font:{size:10}, boxWidth:20 } },
        tooltip:{ callbacks:{ label: ctx=>' '+fmt(ctx.parsed.y)+' THB' } }
      },
      scales:{
        x:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#8a93a8',font:{size:10}} },
        y:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#8a93a8',font:{size:10},callback:v=>fmtB(v)} }
      }
    }
  });
  chartsMap['monthly'] = chart;
}

// DEPT CHART

      },
      scales:{
        x:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#8a93a8',font:{size:9},callback:v=>fmtB(v)} },
        y:{ grid:{display:false}, ticks:{color:'#e8ecf4',font:{size:10}} }
      },
      layout:{ padding:{ right:50 } }
    }
  });
}

// ============================================================
// GAUGE / KPI VISUAL
// ============================================================
function renderGauge(container) {
  container.innerHTML = '';
  const totalVal = filteredData.reduce((a,r)=>a+r.val,0);
  const tgtAll = targetData['All']||0;
  const pass = tgtAll ? totalVal<=tgtAll : null;
  const pct = tgtAll ? (totalVal/tgtAll) : 0.5;

  const gaugeWrap = document.createElement('div');
  gaugeWrap.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:center';
  container.appendChild(gaugeWrap);

  // Gauge canvas
  const gLeft = document.createElement('div'); gLeft.style.cssText='display:flex;flex-direction:column;align-items:center';
  const canvas = document.createElement('canvas'); canvas.width=200; canvas.height=130; gLeft.appendChild(canvas);
  const gVal = document.createElement('div');
  gVal.style.cssText=`font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-top:-16px;color:${pass===false?'var(--accent2)':pass===true?'var(--green)':'var(--blue)'}`;
  gVal.textContent = fmtB(totalVal);
  gLeft.appendChild(gVal);
  const gSub = document.createElement('div'); gSub.style.cssText='font-size:11px;color:var(--text2);margin-top:4px';
  gSub.textContent = tgtAll ? `Target: ${fmtB(tgtAll)} THB` : 'ยังไม่มีข้อมูล Target';
  gLeft.appendChild(gSub);
  if (pass!==null) {
    const badge = document.createElement('div');
    badge.className = `badge ${pass?'badge-g':'badge-r'}`; badge.style.marginTop='6px';
    badge.textContent = pass ? '✓ ผ่านเป้าหมาย' : '⚠ เกินเป้าหมาย';
    gLeft.appendChild(badge);
  }
  gaugeWrap.appendChild(gLeft);

  // Draw gauge
  const ctx = canvas.getContext('2d');
  const cx=100,cy=115,r=85;
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,2*Math.PI); ctx.lineWidth=18; ctx.strokeStyle='#2a3045'; ctx.lineCap='round'; ctx.stroke();
  const ang = Math.PI + Math.min(pct,1.5)*Math.PI;
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,ang); ctx.strokeStyle=pass===false?'#e74c3c':pass===true?'#2ecc71':'#3b8ef3'; ctx.stroke();
  // Target line at 1.0
  if (tgtAll) {
    const ta=2*Math.PI; const tx=cx+r*Math.cos(ta); const ty=cy+r*Math.sin(ta);
    ctx.beginPath(); ctx.arc(tx,ty,5,0,2*Math.PI); ctx.fillStyle='#f5a623'; ctx.fill();
  }

  // Right side stats
  const gRight = document.createElement('div'); gRight.style.cssText='display:flex;flex-direction:column;gap:8px';
  const deptTarget = document.getElementById('fDept').value;
  const deptTgt = deptTarget!=='all' ? (targetData[deptTarget]||0) : 0;
  const stats = [
    { label:'Dept Target', val: deptTgt ? fmtB(deptTgt)+' THB' : (deptTarget==='all'?'—':'ไม่มีข้อมูล'), color:'var(--accent)' },
    { label:'Jobs > 5,000', val: fmt(filteredData.filter(r=>r.val>5000).length)+' jobs', color:'var(--accent2)' },
    { label:'Value Jobs > 5K', val: fmtB(filteredData.filter(r=>r.val>5000).reduce((a,r)=>a+r.val,0))+' THB', color:'var(--blue)' },
    { label:'New Items', val: fmt(filteredData.filter(r=>r.isNew).length)+' items', color:'var(--new-badge)' },
  ];
  stats.forEach(s=>{
    const box = document.createElement('div'); box.style.cssText='background:var(--surface2);border-radius:6px;padding:8px 10px';
    box.innerHTML=`<div style="font-size:10px;color:var(--text2)">${s.label}</div><div style="font-size:15px;font-weight:700;color:${s.color};font-family:'IBM Plex Mono',monospace">${s.val}</div>`;
    gRight.appendChild(box);
  });
  gaugeWrap.appendChild(gRight);
}

// ============================================================
// TABLE
// ============================================================
let currentTableData = [];
function renderTable(card, data, key, isNew=false) {
  const body = card.querySelector('.card-body');
  body.innerHTML = '';

  // Search + count bar
  const bar = document.createElement('div'); bar.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap';
  const inp = document.createElement('input'); inp.type='text'; inp.className='tbl-search';
  inp.placeholder='🔍 ค้นหา...'; inp.id=key+'Search';
  inp.oninput = () => renderTableRows(key, data, tbody, foot, countBadge, inp.value);
  const countBadge = document.createElement('span'); countBadge.className='card-badge'; countBadge.id=key+'Count';
  bar.appendChild(inp); bar.appendChild(countBadge);
  body.appendChild(bar);

  const wrap = document.createElement('div'); wrap.className='tbl-wrap'; body.appendChild(wrap);
  const tbl = document.createElement('table'); wrap.appendChild(tbl);
  const cols = [{k:'jo',l:'JO'},{k:'compnt',l:'Component'},{k:'jo_problem',l:'JO Problem'},{k:'machine',l:'Machine'},{k:'cause',l:'Cause'},{k:'dept',l:'Dept'},{k:'month',l:'Month'},{k:'val',l:'Value (THB)'}];
  const thead = document.createElement('thead'); tbl.appendChild(thead);
  const hrow = document.createElement('tr'); thead.appendChild(hrow);
  cols.forEach(c=>{
    const th=document.createElement('th'); th.textContent=c.l; th.onclick=()=>{ const s=key==='new'?sortNew:sortMain; if(s.col===c.k)s.dir=s.dir==='asc'?'desc':'asc'; else{s.col=c.k;s.dir='desc';} renderTableRows(key,data,tbody,foot,countBadge,inp.value); }; hrow.appendChild(th);
  });
  if (isNew) { const th=document.createElement('th'); th.textContent='Status'; hrow.appendChild(th); }

  const tbody = document.createElement('tbody'); tbl.appendChild(tbody);
  const foot = document.createElement('tfoot'); tbl.appendChild(foot);
  renderTableRows(key, data, tbody, foot, countBadge, '');
}

function renderTableRows(key, srcData, tbody, foot, countBadge, search) {
  const s = key==='new' ? sortNew : sortMain;
  let data = srcData.filter(r => {
    if (!search) return true;
    return [r.jo,r.compnt,r.machine,r.cause,r.dept].some(v=>String(v).toLowerCase().includes(search.toLowerCase()));
  });
  data = [...data].sort((a,b)=>{
    const v=s.dir==='asc'?1:-1;
    const av=a[s.col],bv=b[s.col];
    return (typeof av==='number'?(av-bv):String(av).localeCompare(String(bv)))*v;
  });
  countBadge.textContent = data.length.toLocaleString()+' rows';
  tbody.innerHTML = data.slice(0,500).map(r=>`
    <tr class="${r.isNew?'new-row':''}" onclick="this.classList.toggle('sel')">
      <td>${r.jo}</td><td>${r.compnt}</td><td>${r.jo_problem}</td>
      <td>${r.machine}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis" title="${r.cause}">${r.cause}</td>
      <td>${r.dept}</td>
      <td>${MONTHS[r.month]||''} ${r.year||''}</td>
      <td class="tr" style="${r.val>5000?'color:var(--accent)':''}">${fmt(r.val)}</td>
      ${key==='new'?`<td><span class="new-tag">NEW</span></td>`:''}
    </tr>`).join('');
  const totVal = data.reduce((a,r)=>a+r.val,0);
  foot.innerHTML = `<tr><td colspan="${key==='new'?8:7}"><strong>Total (${data.length.toLocaleString()} rows)</strong></td><td class="tr"><strong>${fmt(totVal)}</strong></td>${key==='new'?'<td></td>':''}</tr>`;
}
